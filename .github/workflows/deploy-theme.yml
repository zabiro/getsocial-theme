# OPCIONAL: deploy con Shopify CLI + Theme Access.
# Si el tema ya está "Conectado desde GitHub" en Shopify admin, NO necesitas este workflow.
# Sin secrets, el workflow termina en verde (omitido) y Shopify sigue sincronizando solo.

name: Deploy GetSocial Theme (opcional)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'config/**'
      - 'layout/**'
      - 'locales/**'
      - 'sections/**'
      - 'snippets/**'
      - 'templates/**'
      - '.github/workflows/deploy-theme.yml'

concurrency:
  group: deploy-theme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Node 24 en runners (aviso deprecación Node 20): https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Comprobar si hay secrets (Theme Access)
        id: secrets
        run: |
          if [ -n "${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}" ] && [ -n "${{ secrets.SHOPIFY_STORE }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Secrets encontrados: se usará Shopify CLI."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Tema vía Shopify + GitHub::No hay secrets de Actions. El tema se actualiza con la conexión nativa en Tienda online → Temas → Conectar desde GitHub. Este workflow se omite a propósito."
          fi

      - name: Omitir deploy (usa integración Shopify ↔ GitHub)
        if: steps.secrets.outputs.ready != 'true'
        run: |
          echo "✅ OK — No se requiere GitHub Actions."
          echo "Tu repo está conectado en Shopify; cada push a main sincroniza el tema."
          echo "Si quieres ADEMÁS deploy por CLI, añade secrets: SHOPIFY_CLI_THEME_TOKEN y SHOPIFY_STORE"
          echo "Ver docs/GITHUB-DEPLOY.md"

      - name: Prepare theme folder
        if: steps.secrets.outputs.ready == 'true'
        run: |
          mkdir -p deploy-theme
          for dir in assets config layout locales sections snippets templates; do
            cp -R "$dir" deploy-theme/
          done
          find deploy-theme -type f | wc -l

      - name: Install Shopify CLI
        if: steps.secrets.outputs.ready == 'true'
        run: npm install -g @shopify/cli@latest

      - name: Push theme via CLI
        if: steps.secrets.outputs.ready == 'true'
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_FLAG_FORCE: '1'
        run: |
          shopify theme push \
            --path deploy-theme \
            --store "${{ secrets.SHOPIFY_STORE }}" \
            --password "${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}" \
            --unpublished
