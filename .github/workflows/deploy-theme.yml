# Despliega el tema a Shopify en cada push a main.
# Requisitos: instalar app "Theme Access" en la tienda y configurar secrets en GitHub.
# Ver docs/GITHUB-DEPLOY.md

name: Deploy GetSocial Theme

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'config/**'
      - 'layout/**'
      - 'locales/**'
      - 'sections/**'
      - 'snippets/**'
      - 'templates/**'
      - '.github/workflows/deploy-theme.yml'
  workflow_dispatch:

concurrency:
  group: deploy-theme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate GitHub secrets
        run: |
          if [ -z "${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}" ]; then
            echo "::error::Falta el secret SHOPIFY_CLI_THEME_TOKEN (contraseña de Theme Access). Ver docs/GITHUB-DEPLOY.md"
            exit 1
          fi
          if [ -z "${{ secrets.SHOPIFY_STORE }}" ]; then
            echo "::error::Falta el secret SHOPIFY_STORE (ej: prueba-tienda-3bmgzfei.myshopify.com)"
            exit 1
          fi

      - name: Prepare theme folder (solo archivos Shopify)
        run: |
          mkdir -p deploy-theme
          for dir in assets config layout locales sections snippets templates; do
            cp -R "$dir" deploy-theme/
          done
          echo "Archivos a subir:"
          find deploy-theme -type f | wc -l

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push theme to store
        env:
          SHOPIFY_FLAG_FORCE: '1'
        run: |
          set -e
          ARGS="--path deploy-theme --store ${{ secrets.SHOPIFY_STORE }} --password ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }} --unpublished"
          if [ -n "${{ secrets.SHOPIFY_THEME_ID }}" ]; then
            ARGS="$ARGS --theme ${{ secrets.SHOPIFY_THEME_ID }}"
          fi
          echo "Subiendo tema a ${{ secrets.SHOPIFY_STORE }} ..."
          shopify theme push $ARGS

      - name: Deploy summary
        if: success()
        run: echo "Tema actualizado correctamente en ${{ secrets.SHOPIFY_STORE }}"
